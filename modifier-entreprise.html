<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier une entreprise - BHStage</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="modifier-entreprise.css">
</head>
<body>

    <header class="topbar">
        <div class="topbar-left">
            <img src="allostage.png" alt="Logo AlloStage" class="logo">
        </div>

        <nav class="topbar-nav">
            <a href="index.html">Accueil</a>
            <a href="liste-offres.html">Offres de stages</a>
            <a href="liste-entreprises.html" class="active">Entreprises</a>
        </nav>

        <div class="topbar-right">
            <a href="#" class="admin-btn">Espace Administrateur</a>
        </div>
    </header>

    <main class="page-wrapper">
        <section class="form-card">

            <div class="form-header">
                <h1>Modifier une entreprise</h1>
                <p>Mettre à jour les informations d’une entreprise partenaire.</p>
            </div>

            <form class="company-form" action="#" method="POST">

                <div class="form-group full-width">
                    <label for="nom_entreprise">Nom de l'entreprise *</label>
                    <input type="text" id="nom_entreprise" name="nom_entreprise" value="TechSolutions SAS" required>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label for="domaine">Domaine d'activité *</label>
                        <input type="text" id="domaine" name="domaine" value="Informatique, Cybersécurité" required>
                    </div>

                    <div class="form-group">
                        <label for="taille">Taille (nombre de salariés) *</label>
                        <input type="number" id="taille" name="taille" value="45" required>
                    </div>

                    <div class="form-group">
                        <label for="ville">Ville (Siège social) *</label>
                        <input type="text" id="ville" name="ville" value="Paris" required>
                    </div>

                    <div class="form-group">
                        <label for="telephone">Téléphone</label>
                        <input type="text" id="telephone" name="telephone" value="01 23 45 67 89">
                    </div>

                    <div class="form-group full-grid">
                        <label for="email">Adresse e-mail de contact *</label>
                        <input type="email" id="email" name="email" value="contact@entreprise.fr" required>
                    </div>
                </div>

                <div class="form-group full-width">
                    <label for="description">Description de l'entreprise *</label>
                    <textarea id="description" name="description" rows="7" required>Entreprise spécialisée dans le développement de solutions numériques et l'accompagnement de projets innovants.</textarea>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-cancel" onclick="history.back()">Annuler</button>
                    <button type="submit" class="btn btn-submit">Enregistrer les modifications</button>
                </div>

            </form>
        </section>
    </main>

</body>
</html>
