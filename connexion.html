<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - BHStage</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="connexion.css">
</head>
<body>

    <div class="login-container">
        <div class="logo-section">
            <img src="allostage.png" alt="Logo BHStage" class="logo-img">
        </div>

        <div class="header-text">
            <h2>Se connecter</h2>
            <p>Salut ! Ravi de vous revoir.</p>
        </div>

        <form action="traitement.php" method="post" class="login-form">
            
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Votre adresse mail" required>
            </div>

            <div class="input-group">
                <label for="password">Mot de passe</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="mot_de_passe" placeholder="Votre mot de passe" required>
                    <i class="fas fa-eye" id="icone-oeil" style="cursor: pointer;"></i>
                </div>
            </div>

            <a href="oubli.html" class="forgot-password">Mot de passe oublié ?</a>

            <button type="submit" class="btn-submit">Se connecter</button>

        </form>

        <div class="signup-link">
            <p>Vous n'avez pas de compte ? <a href="inscription.html">S'inscrire</a></p>
        </div>

        <div class="footer-bottom">
            <a href="mentions.html" class="legal-link">Mentions légales</a>
        </div>
    </div>

    <script>
        const iconeOeil = document.getElementById('icone-oeil');
        const champMdp = document.getElementById('password'); // On cible ton id="password" de la ligne 34

        iconeOeil.addEventListener('click', function () {
            // On vérifie si c'est caché ou visible
            const type = champMdp.getAttribute('type') === 'password' ? 'text' : 'password';
            champMdp.setAttribute('type', type);

            // On change l'icône : oeil normal <-> oeil barré
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });
    </script>

</body>
</html>
