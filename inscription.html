<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - BHStage</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="inscription.css">
</head>

<body>

<div class="login-container">

    <div class="logo-section">
        <img src="allostage.png" alt="Logo BHStage" class="logo-img">
    </div>

    <div class="header-text">
        <h2>S'inscrire</h2>
        <p>Créez votre compte pour accéder aux offres.</p>
    </div>

    <form class="login-form" action="traitement.php" method="POST">

        <div class="input-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="Votre adresse mail" required>
        </div>

        <div class="input-group">
            <label>Mot de passe</label>
            <div class="password-wrapper">
                <input type="password" id="mot_de_passe" name="mot_de_passe" placeholder="Votre mot de passe" required>
                <i class="fas fa-eye" id="icone-oeil-1" style="cursor: pointer;"></i>
            </div>
        </div>

        <div class="input-group">
            <label>Confirmer le mot de passe</label>
            <div class="password-wrapper">
                <input type="password" id="confirm_mot_de_passe" name="confirm_mot_de_passe" placeholder="Confirmer votre mot de passe" required>
                <i class="fas fa-eye" id="icone-oeil-2" style="cursor: pointer;"></i>
            </div>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="conditions" name="conditions" required>
            <label for="conditions">
                J'accepte les <a href="conditions.html">Conditions d'utilisation</a>
                et la <a href="politique.html">Politique de confidentialité</a>
            </label>
        </div>

        <button type="submit" class="btn-submit">
            Continuer
        </button>

    </form>

    <div class="signup-link">
        <p>Vous avez déjà un compte ? <a href="connexion.html">Se connecter</a></p>
    </div>

    <div class="footer-bottom">
        <a href="mentions.html" class="legal-link">Mentions légales</a>
    </div>

</div>

</body>
</html>
