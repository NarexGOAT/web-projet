<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des pilotes - AlloStage</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="gestion-pilotes.css">
</head>

<body>

<header class="entete">
    <div class="logo">
        <a href="index.html">
            <img src="allostage.png" class="logo-img">
        </a>
    </div>

    <nav class="navigation">
        <ul>
            <li><a href="index.html">Accueil</a></li>
            <li><a href="gestion-etudiants.html">Étudiants</a></li>
            <li><a href="#" class="actif">Pilotes</a></li>
        </ul>
    </nav>

    <div class="actions-entete">
        <span class="texte-admin">Admin</span>
    </div>
</header>

<main class="contenu fond-gris">

    <div class="boite-blanche">

        <h1>Gestion des pilotes</h1>

        <!-- 🔎 RECHERCHE (SFx12) -->
        <div class="barre-recherche">
            <input type="text" placeholder="Rechercher un pilote...">
            <button class="btn-principal">Rechercher</button>
        </div>

        <!-- ➕ AJOUT (SFx13) -->
        <div class="ajout">
            <button class="btn-principal">+ Ajouter un pilote</button>
        </div>

        <!-- 📋 LISTE -->
        <table class="table-pilotes">
            <thead>
                <tr>
                    <th>Nom</th>
                    <th>Email</th>
                    <th>Spécialité</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>Durand</td>
                    <td>durand@email.com</td>
                    <td>Informatique</td>
                    <td>
                        <button class="btn-modifier">Modifier</button>
                        <button class="btn-supprimer">Supprimer</button>
                    </td>
                </tr>

                <tr>
                    <td>Bernard</td>
                    <td>bernard@email.com</td>
                    <td>Marketing</td>
                    <td>
                        <button class="btn-modifier">Modifier</button>
                        <button class="btn-supprimer">Supprimer</button>
                    </td>
                </tr>
            </tbody>
        </table>

    </div>

</main>

<footer class="pied-de-page">
    <p>&copy; 2026 AlloStage</p>
</footer>

</body>
</html>
