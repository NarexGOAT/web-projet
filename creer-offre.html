<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer une offre de stage - BHStage</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="creer-offre.css">
</head>

<body>

<div class="login-container">

    <div class="logo-section">
        <img src="allostage.png" alt="Logo BHStage" class="logo-img">
    </div>

    <div class="header-text">
        <h2>Créer une offre de stage</h2>
        <p>Ajoutez une nouvelle offre de stage à la plateforme.</p>
    </div>

    <form class="login-form" action="#" method="POST">

        <div class="input-group">
            <label for="titre">Titre de l'offre</label>
            <input type="text" id="titre" name="titre" placeholder="Ex : Développeur web stagiaire" required>
        </div>

        <div class="input-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" placeholder="Décrivez l'offre de stage" rows="4" required></textarea>
        </div>

        <div class="input-group">
            <label for="competence">Compétence recherchée</label>
            <input type="text" id="competence" name="competence" placeholder="Ex : PHP, SQL, JavaScript" required>
        </div>

        <div class="input-group">
            <label for="duree_stage">Durée du stage</label>
            <input type="text" id="duree_stage" name="duree_stage" placeholder="Ex : 6 mois" required>
        </div>

        <div class="input-group">
            <label for="id_entreprise">Entreprise</label>
            <select id="id_entreprise" name="id_entreprise" required>
                <option value="">Sélectionnez une entreprise</option>
                <option value="1">Entreprise 1</option>
                <option value="2">Entreprise 2</option>
                <option value="3">Entreprise 3</option>
            </select>
        </div>

        <div class="input-group">
            <label for="remuneration">Rémunération</label>
            <input type="number" id="remuneration" name="remuneration" placeholder="Ex : 600" step="0.01" required>
        </div>

        <button type="submit" class="btn-submit">
            Créer l'offre
        </button>

    </form>

    <div class="footer-bottom">
        <a href="index.html" class="legal-link">← Retour à l'accueil</a>
    </div>

</div>

</body>
</html>
