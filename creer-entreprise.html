<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer une entreprise - BHStage</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="creer-entreprise.css">
</head>

<body>

<div class="login-container">

    <div class="logo-section">
        <img src="allostage.png" alt="Logo BHStage" class="logo-img">
    </div>

    <div class="header-text">
        <h2>Créer une entreprise</h2>
        <p>Ajoutez une entreprise à la plateforme pour publier des offres de stage.</p>
    </div>

    <form class="login-form" action="#" method="POST">

        <div class="input-group">
            <label for="nom_entreprise">Nom de l'entreprise</label>
            <input type="text" id="nom_entreprise" name="nom_entreprise" placeholder="Nom de l'entreprise" required>
        </div>

        <div class="input-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" placeholder="Décrivez l'entreprise" rows="4" required></textarea>
        </div>

        <div class="input-group">
            <label for="email">Email de contact</label>
            <input type="email" id="email" name="email" placeholder="Adresse email" required>
        </div>

        <div class="input-group">
            <label for="telephone">Téléphone</label>
            <input type="text" id="telephone" name="telephone" placeholder="Numéro de téléphone" required>
        </div>

        <button type="submit" class="btn-submit">
            Créer l'entreprise
        </button>

    </form>

    <div class="footer-bottom">
        <a href="index.html" class="legal-link">← Retour à l'accueil</a>
    </div>

</div>

</body>
</html>
